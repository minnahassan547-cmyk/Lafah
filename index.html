const ticket = document.getElementById('ticket');
const stubIcon = document.getElementById('stubIcon');

const catLabel = document.getElementById('catLabel');
const contentText = document.getElementById('contentText');
const spinBtn = document.getElementById('spinBtn');

const globalCountEl = document.getElementById('globalCount');

const arabicDigits = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
function toArabicNum(n){ return String(n).split('').map(d => arabicDigits[+d] ?? d).join(''); }

let spins = 0;
let recentKeys = []; // لتجنب تكرار نفس المحتوى بسرعة

function keyOf(cat,item){ return cat.id + '|' + item; }

function pickRandom(){
  let cat, item, key, tries = 0;
  do{
    cat = categories[Math.floor(Math.random()*categories.length)];
    item = cat.items[Math.floor(Math.random()*cat.items.length)];
    key = keyOf(cat,item);
    tries++;
  } while(recentKeys.includes(key) && tries < 12);
  recentKeys.push(key);
  if(recentKeys.length > 10) recentKeys.shift();
  return {cat,item};
}

function render({cat,item}, isFinal){
  ticket.style.setProperty('--accent', cat.color);
  stubIcon.textContent = cat.icon;
  catLabel.textContent = cat.label;
  contentText.textContent = item;
  contentText.classList.remove('placeholder');
  if(isFinal){ stubNum.textContent = toArabicNum(String(spins).padStart(3,'0')); }
}

// ----- العداد المشترك (قاعدة بيانات بسيطة بين كل المستخدمين) -----
async function loadGlobalCount(){
  try{
    const res = await window.storage.get('lafa:global_spins', true);
    const n = res ? (parseInt(res.value,10) || 0) : 0;
    globalCountEl.textContent = '🌍 إجمالي لفّات الجميع: ' + toArabicNum(n);
  }catch(e){
    globalCountEl.textContent = '🌍 إجمالي لفّات الجميع: ' + toArabicNum(0);
  }
}

async function bumpGlobalCount(){
  try{
    let current = 0;
    try{
      const res = await window.storage.get('lafa:global_spins', true);
      current = res ? (parseInt(res.value,10) || 0) : 0;
    }catch(e){ current = 0; }
    current += 1;
    await window.storage.set('lafa:global_spins', String(current), true);
    globalCountEl.textContent = '🌍 إجمالي لفّات الجميع: ' + toArabicNum(current);
  }catch(e){
    // لو التخزين غير متاح، نتجاهل بصمت ونكمل بدون العداد المشترك
  }
}

function spin(){
  spinBtn.disabled = true;
  ticket.style.transform = 'scale(.97)';

  const delays = [55,55,65,75,90,110,140,180,230];
  let i = 0;

  function tick(){
    render(pickRandom(), false);
    if(i < delays.length - 1){
      i++;
      setTimeout(tick, delays[i]);
    } else {
      spins++;
      const final = pickRandom();
      render(final, true);
      countEl.textContent = toArabicNum(spins);
      ticket.style.transform = 'scale(1)';
      spinBtn.disabled = false;
      bumpGlobalCount();
    }
  }
  tick();
}

spinBtn.addEventListener('click', spin);
loadGlobalCount();
</script>

</body>
</html>
